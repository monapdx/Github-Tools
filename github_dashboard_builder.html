<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Dashboard Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
html { -webkit-text-size-adjust: 100%; }
img, video, canvas, svg { max-width: 100%; height: auto; }


    :root {
      --bg: #0b0c10;
      --panel: #11131a;
      --panel-2: #171923;
      --soft: #202433;
      --border: #2c3243;
      --text: #f4f7ff;
      --muted: #aab4cb;
      --accent: #ff1493;
      --accent-2: #ff4db2;
      --danger: #fb7185;
      --shadow: 0 16px 40px rgba(0,0,0,.35);
      --radius: 16px;
      /* Neo-brutalist export controls */
      --brutal-ink: #07080d;
      --brutal-shadow: 5px 5px 0 var(--brutal-ink);
      --brutal-shadow-sm: 3px 3px 0 var(--brutal-ink);
      --brutal-lime: #c8f542;
      --brutal-cream: #f2efe6;
      --brutal-yellow: #ffe14a;
      --font-export: "Oswald", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,20,147,.18), transparent 26%),
        radial-gradient(circle at top left, rgba(86,130,255,.12), transparent 22%),
        var(--bg);
      color: var(--text);
    }

    button, input, textarea, select { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: 340px 1fr 1fr;
      min-height: 100vh;
    }

    .sidebar, .builder, .preview {
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .preview { border-right: 0; }

    .pane {
      padding: 20px;
      height: 100vh;
      overflow: auto;
    }

    .hero { margin-bottom: 18px; }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 1.45rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .hero p { margin: 0; color: var(--muted); font-size: 0.95rem; }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 16px;
    }

    .panel h2, .panel h3 { margin: 0 0 10px; font-size: 1rem; }
    .panel p.small, .small { margin: 0; color: var(--muted); font-size: 0.88rem; }

    .sidebar-section {
      padding: 0;
      overflow: hidden;
    }

    .sidebar-section.is-collapsed .sidebar-section-body,
    .preview-markdown-section.is-collapsed .sidebar-section-body {
      display: none;
    }

    .sidebar-section-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      margin: 0;
      border: none;
      border-radius: var(--radius);
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .sidebar-section-toggle:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .sidebar-section-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .sidebar-section-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .sidebar-section-chevron {
      flex-shrink: 0;
      font-size: 0.75rem;
      color: var(--muted);
      transition: transform 0.2s ease;
    }

    .sidebar-section.is-collapsed .sidebar-section-chevron,
    .preview-markdown-section.is-collapsed .sidebar-section-chevron {
      transform: rotate(-90deg);
    }

    .sidebar-section-body {
      padding: 0 14px 14px;
      display: grid;
      gap: 10px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* Neo-brutalist + Oswald: Export (stacked) + Presets (2×2 grid) */
    .export-actions {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .preset-actions,
    .add-block-actions {
      gap: 12px;
    }

    .export-actions button,
    .preset-actions button,
    .add-block-actions button {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      padding: 0.75rem 1rem;
      font-family: var(--font-export);
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 6px;
      border: 3px solid var(--brutal-ink);
      color: var(--brutal-ink);
      background: var(--brutal-cream);
      box-shadow: var(--brutal-shadow);
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .export-actions button:hover,
    .preset-actions button:hover,
    .add-block-actions button:hover {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 var(--brutal-ink);
    }

    .export-actions button:active,
    .preset-actions button:active,
    .add-block-actions button:active {
      transform: translate(3px, 3px);
      box-shadow: var(--brutal-shadow-sm);
    }

    .export-actions button:focus-visible,
    .preset-actions button:focus-visible,
    .add-block-actions button:focus-visible {
      outline: 3px solid var(--brutal-lime);
      outline-offset: 3px;
    }

    .export-actions #copyMarkdownBtn {
      background: var(--accent);
      color: #fff;
      border-color: var(--brutal-ink);
      box-shadow: var(--brutal-shadow);
    }

    .export-actions #copyMarkdownBtn:hover {
      background: #ff4db2;
    }

    .export-actions #downloadMarkdownBtn,
    .export-actions #downloadJsonBtn {
      background: var(--brutal-yellow);
      color: var(--brutal-ink);
    }

    .export-actions #downloadMarkdownBtn:hover,
    .export-actions #downloadJsonBtn:hover {
      background: #fff08a;
    }

    .export-actions #loadJsonBtn {
      background: var(--brutal-lime);
      color: var(--brutal-ink);
    }

    .export-actions #loadJsonBtn:hover {
      background: #def65a;
    }

    .preset-actions [data-preset="readme"] {
      background: var(--accent);
      color: #fff;
    }

    .preset-actions [data-preset="readme"]:hover {
      background: #ff4db2;
    }

    .preset-actions [data-preset="profile"] {
      background: var(--brutal-yellow);
    }

    .preset-actions [data-preset="profile"]:hover {
      background: #fff08a;
    }

    .preset-actions [data-preset="docs"] {
      background: var(--brutal-lime);
    }

    .preset-actions [data-preset="docs"]:hover {
      background: #def65a;
    }

    .preset-actions [data-preset="roadmap"] {
      background: var(--brutal-cream);
    }

    .preset-actions [data-preset="roadmap"]:hover {
      background: #faf7ef;
    }

    /* Add block — same brutal frame; label + hint stack; cycle fills */
    .block-types.add-block-actions button {
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      min-height: 4.5rem;
      text-transform: none;
      letter-spacing: 0.03em;
      font-size: 0.8125rem;
      line-height: 1.25;
    }

    .block-types.add-block-actions button span {
      font-family: Inter, system-ui, sans-serif;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--brutal-ink);
      opacity: 0.72;
      margin-top: 4px;
      text-transform: none;
    }

    .add-block-actions button:nth-child(4n + 1) {
      background: var(--accent);
      color: #fff;
    }

    .add-block-actions button:nth-child(4n + 1) span {
      color: rgba(255, 255, 255, 0.9);
      opacity: 1;
    }

    .add-block-actions button:nth-child(4n + 1):hover {
      background: #ff4db2;
    }

    .add-block-actions button:nth-child(4n + 2) {
      background: var(--brutal-yellow);
    }

    .add-block-actions button:nth-child(4n + 2):hover {
      background: #fff08a;
    }

    .add-block-actions button:nth-child(4n + 3) {
      background: var(--brutal-lime);
    }

    .add-block-actions button:nth-child(4n + 3):hover {
      background: #def65a;
    }

    .add-block-actions button:nth-child(4n + 4) {
      background: var(--brutal-cream);
    }

    .add-block-actions button:nth-child(4n + 4):hover {
      background: #faf7ef;
    }

    button {
      border: 1px solid var(--border);
      background: var(--soft);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      transition: .18s ease;
    }

    button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    button.primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: white;
      font-weight: 700;
    }

    button.ghost { background: transparent; }
    button.danger {
      background: rgba(251, 113, 133, 0.12);
      color: #ffd7df;
      border-color: rgba(251, 113, 133, 0.35);
    }

    .block-types {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .block-types button {
      text-align: left;
      min-height: 64px;
      font-size: 0.92rem;
      line-height: 1.2;
    }

    .block-types span {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .block-types.add-block-actions {
      gap: 12px;
    }

    .list { display: grid; gap: 10px; }

    .block-card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 0;
    }

    .block-card.is-collapsed .block-card-body {
      display: none;
    }

    .block-card-header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .block-card.is-collapsed .block-card-header {
      margin-bottom: 0;
    }

    .block-card-toggle {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 8px;
      margin: -4px -8px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .block-card-toggle:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .block-card-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .block-card-toggle-text {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .block-card-toggle-text strong { font-size: 0.98rem; }

    .block-card-chevron {
      flex-shrink: 0;
      font-size: 0.75rem;
      color: var(--muted);
      transition: transform 0.2s ease;
    }

    .block-card.is-collapsed .block-card-chevron {
      transform: rotate(-90deg);
    }

    .block-card-body {
      display: grid;
      gap: 12px;
    }

    .meta {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; }
    .toolbar button { padding: 7px 10px; font-size: 0.85rem; }

    .field { display: grid; gap: 6px; }
    .field label { font-size: 0.84rem; color: var(--muted); font-weight: 600; }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
    }

    .field textarea { resize: vertical; min-height: 88px; }
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,20,147,.14);
    }

    pre, .markdown-output {
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      font-size: 0.93rem;
    }

    .preview-box {
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      line-height: 1.55;
    }

    .preview-box h1,
    .preview-box h2,
    .preview-box h3 { margin-top: 1.1em; margin-bottom: 0.45em; }
    .preview-box h1:first-child { margin-top: 0; }
    .preview-box code {
      background: rgba(255,255,255,.06);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .preview-box table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      margin: 12px 0;
      border-radius: 12px;
      overflow: hidden;
    }

    .preview-box th,
    .preview-box td {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      vertical-align: top;
      text-align: left;
    }

    .preview-box thead th {
      background: rgba(255,255,255,.04);
      border-top: 0;
    }

    .preview-box .md-button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }

    .preview-box .md-button-row a {
      display: inline-block;
      line-height: 0;
    }

    .preview-box .md-button-row img {
      max-height: 28px;
      width: auto;
      display: block;
    }

    .preview-box details {
      margin: 14px 0;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      white-space: pre-line;
    }

    .preview-box details > summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
      list-style: none;
    }

    .preview-box details > summary::-webkit-details-marker {
      display: none;
    }

    .preview-box details > summary::before {
      content: "▸ ";
      display: inline-block;
      margin-right: 6px;
      transition: transform 0.15s ease;
      color: var(--muted);
    }

    .preview-box details[open] > summary::before {
      transform: rotate(90deg);
    }

    .preview-box a {
      color: var(--accent-2);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .preview-box a:hover {
      color: var(--accent);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-size: 0.76rem;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    .hidden { display: none !important; }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 320px 1fr; }
      .preview {
        grid-column: 1 / -1;
        border-top: 1px solid var(--border);
      }
      .preview .pane { height: auto; min-height: 40vh; }
    }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .sidebar, .builder, .preview {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .pane { height: auto; }
      .button-grid, .block-types { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="pane">
        <div class="hero">
          <h1>GitHub Dashboard Builder</h1>
          <p>Build GitHub-friendly markdown dashboards, READMEs, profile pages, and project hubs from reusable blocks.</p>
        </div>

        <section class="panel">
          <h2>Project</h2>
          <div class="field">
            <label for="docName">Output filename</label>
            <input id="docName" type="text" value="README.md" />
          </div>
          <div class="field" style="margin-top:10px;">
            <label for="docTitle">Internal project label</label>
            <input id="docTitle" type="text" value="GitHub Dashboard" />
          </div>
        </section>

        <section class="panel sidebar-section is-collapsed" data-sidebar-section="presets">
          <button type="button" class="sidebar-section-toggle" aria-expanded="false" aria-controls="sidebar-presets-body" id="sidebar-presets-head">
            <span class="sidebar-section-title">Presets</span>
            <span class="sidebar-section-chevron" aria-hidden="true">▾</span>
          </button>
          <div class="sidebar-section-body" id="sidebar-presets-body" role="region" aria-labelledby="sidebar-presets-head">
            <div class="button-grid preset-actions">
              <button data-preset="readme">README</button>
              <button data-preset="profile">Profile README</button>
              <button data-preset="docs">Docs Hub</button>
              <button data-preset="roadmap">Roadmap</button>
            </div>
          </div>
        </section>

        <section class="panel sidebar-section is-collapsed" data-sidebar-section="add">
          <button type="button" class="sidebar-section-toggle" aria-expanded="false" aria-controls="sidebar-add-body" id="sidebar-add-head">
            <span class="sidebar-section-title">Add block</span>
            <span class="sidebar-section-chevron" aria-hidden="true">▾</span>
          </button>
          <div class="sidebar-section-body" id="sidebar-add-body" role="region" aria-labelledby="sidebar-add-head">
            <div class="block-types add-block-actions" id="addBlockButtons"></div>
          </div>
        </section>

        <section class="panel sidebar-section is-collapsed" data-sidebar-section="export">
          <button type="button" class="sidebar-section-toggle" aria-expanded="false" aria-controls="sidebar-export-body" id="sidebar-export-head">
            <span class="sidebar-section-title">Export</span>
            <span class="sidebar-section-chevron" aria-hidden="true">▾</span>
          </button>
          <div class="sidebar-section-body" id="sidebar-export-body" role="region" aria-labelledby="sidebar-export-head">
            <div class="button-grid export-actions">
              <button class="primary" id="copyMarkdownBtn">Copy .md</button>
              <button id="downloadMarkdownBtn">Download .md</button>
              <button id="downloadJsonBtn">Download JSON</button>
              <button id="loadJsonBtn">Load JSON</button>
            </div>
            <input id="jsonInput" class="hidden" type="file" accept="application/json" />
          </div>
        </section>
      </div>
    </aside>

    <main class="builder">
      <div class="pane">
        <div class="pill">Builder</div>
        <div id="blocksList" class="list"></div>
      </div>
    </main>

    <section class="preview">
      <div class="pane">
        <div class="panel sidebar-section preview-markdown-section is-collapsed">
          <button type="button" class="sidebar-section-toggle" aria-expanded="false" aria-controls="preview-markdown-body" id="preview-markdown-head">
            <span class="sidebar-section-title">Generated Markdown</span>
            <span class="sidebar-section-chevron" aria-hidden="true">▾</span>
          </button>
          <div class="sidebar-section-body" id="preview-markdown-body" role="region" aria-labelledby="preview-markdown-head">
            <pre id="markdownOutput" class="markdown-output"></pre>
          </div>
        </div>
        <div class="pill">Quick Preview</div>
        <div id="renderedPreview" class="preview-box"></div>
      </div>
    </section>
  </div>

  <script>
    const BLOCK_TYPES = {
      heading: { label: 'Heading', hint: 'Title and intro', defaults: () => ({ level: 1, text: 'Project Title', body: 'A short introduction or project summary.' }) },
      badges: { label: 'Badges', hint: 'Shields and status', defaults: () => ({ items: '[![License](https://img.shields.io/badge/license-MIT-blue?style=flat-square)](#license)\n[![Demo](https://img.shields.io/badge/demo-live-hotpink?style=flat-square)](https://example.com)' }) },
      links: { label: 'Quick Links', hint: 'Jump links or CTAs', defaults: () => ({ items: 'Live Demo|https://example.com\nOpen Issues|https://github.com/owner/repo/issues\nDocumentation|#documentation' }) },
      paragraph: { label: 'Paragraph', hint: 'Freeform text', defaults: () => ({ title: 'Overview', body: 'Write a short paragraph here using plain markdown-friendly text.' }) },
      toc: { label: 'Table of Contents', hint: 'Auto-generated links', defaults: () => ({}) },
      checklist: { label: 'Checklist', hint: 'Roadmap/tasks', defaults: () => ({ title: 'Roadmap', items: 'true|Launch MVP\nfalse|Add JSON import/export presets\nfalse|Publish demo on GitHub Pages' }) },
      table: { label: 'Table', hint: 'Structured info', defaults: () => ({ title: 'Feature Matrix', headers: 'Feature|Status|Notes', rows: 'Markdown export|Done|Downloads a .md file\nJSON config|Done|Export and import layouts\nDrag and drop|Planned|Could be added later' }) },
      details: { label: 'Details', hint: 'Collapsible section', defaults: () => ({ summary: 'See more', body: 'Put extra notes, setup instructions, or FAQ content here.' }) },
      code: { label: 'Code Block', hint: 'Snippet or shell command', defaults: () => ({ title: 'Install', language: 'bash', body: 'npm install\nnpm run dev' }) },
      image: { label: 'Image', hint: 'Screenshot or banner', defaults: () => ({ alt: 'Project screenshot', url: 'https://placehold.co/1200x700/png', title: 'Preview' }) },
      quote: { label: 'Quote', hint: 'Callout or note', defaults: () => ({ body: 'Built for people who want GitHub pages that feel useful, clear, and intentional.' }) },
      buttons: { label: 'Buttons', hint: 'Badge-style links', defaults: () => ({ items: 'Star Repo|https://github.com/owner/repo|https://img.shields.io/badge/Star-Repo-ff69b4?style=for-the-badge\nLive Demo|https://example.com|https://img.shields.io/badge/Live-Demo-111827?style=for-the-badge' }) },
      divider: { label: 'Divider', hint: 'Horizontal rule', defaults: () => ({}) },
      custom: { label: 'Custom Markdown', hint: 'Paste your own block', defaults: () => ({ body: '## Custom Section\n\nAdd any markdown here.' }) }
    };

    const state = {
      docName: 'README.md',
      docTitle: 'GitHub Dashboard',
      blocks: [],
      expandedBlockId: null,
      sidebarExpandedSection: null,
      previewMarkdownExpanded: false
    };

    const blocksList = document.getElementById('blocksList');
    const markdownOutput = document.getElementById('markdownOutput');
    const renderedPreview = document.getElementById('renderedPreview');
    const addBlockButtons = document.getElementById('addBlockButtons');
    const docNameInput = document.getElementById('docName');
    const docTitleInput = document.getElementById('docTitle');
    const jsonInput = document.getElementById('jsonInput');

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /** Only http(s) URLs in preview to avoid javascript: / data: surprises. */
    function isSafeHttpUrl(s) {
      const u = String(s || '').trim();
      if (!/^https?:\/\//i.test(u)) return false;
      try {
        const parsed = new URL(u);
        return parsed.protocol === 'http:' || parsed.protocol === 'https:';
      } catch {
        return false;
      }
    }

    /** http(s), same-document #fragments, and simple mailto: links for preview. */
    function isSafeLinkHref(href) {
      const u = String(href || '').trim();
      if (!u) return false;
      if (isSafeHttpUrl(u)) return true;
      if (u.startsWith('#')) {
        if (u.length < 2) return false;
        if (/javascript:/i.test(u) || /data:/i.test(u)) return false;
        return /^#[^\s#"'<>`]+$/i.test(u);
      }
      if (/^mailto:/i.test(u)) {
        const rest = u.slice(7).trim();
        return rest.includes('@') && !/[\s"'<>()]/.test(rest);
      }
      return false;
    }

    /**
     * Turn inline markdown [label](href) into <a>; escapes all other text.
     * Skips image syntax ![...](...) via negative lookbehind.
     */
    function renderInlineMarkdownLinks(text) {
      const s = String(text || '');
      const re = /(?<!!)\[([^\]]+)\]\(([^)]+)\)/g;
      let out = '';
      let last = 0;
      let m;
      while ((m = re.exec(s)) !== null) {
        out += escapeHtml(s.slice(last, m.index));
        const label = m[1];
        const href = m[2];
        if (isSafeLinkHref(href)) {
          const ht = href.trim();
          const isFrag = ht.startsWith('#');
          const rel = isFrag ? '' : ' rel="noopener noreferrer"';
          const tgt = isFrag ? '' : ' target="_blank"';
          out += `<a href="${escapeHtml(ht)}"${tgt}${rel}>${escapeHtml(label)}</a>`;
        } else {
          out += escapeHtml(m[0]);
        }
        last = m.index + m[0].length;
      }
      out += escapeHtml(s.slice(last));
      return out;
    }

    /** Light cleanup before injecting HTML preview fragments (details, etc.). */
    function stripUnsafeHtmlFragment(html) {
      return String(html || '')
        .replace(/<script\b[\s\S]*?<\/script>/gi, '')
        .replace(/\s(on\w+)\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, ' ');
    }

    /**
     * Our generator emits <details><summary>…</summary> then plain body lines; linkify body for preview.
     * Unknown shapes are returned unchanged (after stripUnsafeHtmlFragment).
     */
    function processDetailsChunkForPreview(html) {
      const stripped = stripUnsafeHtmlFragment(String(html || ''));
      const m = stripped.match(/^<details([^>]*)>\s*<summary>([\s\S]*?)<\/summary>\s*([\s\S]*?)<\/details>\s*$/i);
      if (!m) return stripped;
      const attrs = m[1] || '';
      const summaryInner = m[2];
      const body = m[3].replace(/\s+$/, '');
      const paras = [];
      for (const line of body.split('\n')) {
        if (!line.trim()) continue;
        paras.push('<p>' + renderInlineMarkdownLinks(line) + '</p>');
      }
      return `<details${attrs}>\n<summary>${summaryInner}</summary>\n${paras.join('\n')}\n</details>`;
    }

    /**
     * Renders list text after "- " for preview: task items, markdown links, or plain text.
     */
    function renderListItemBody(raw) {
      const t = String(raw || '');
      const task = t.match(/^\[([xX ])\]\s*(.+)$/);
      if (task) {
        const done = String(task[1]).trim().toLowerCase() === 'x';
        return `<span class="md-task">${done ? '&#9745;' : '&#9744;'}</span> ${renderInlineMarkdownLinks(task[2])}`;
      }
      const link = t.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
      if (link && isSafeLinkHref(link[2])) {
        const ht = link[2].trim();
        const isFrag = ht.startsWith('#');
        const rel = isFrag ? '' : ' rel="noopener noreferrer"';
        const tgt = isFrag ? '' : ' target="_blank"';
        return `<a href="${escapeHtml(ht)}"${tgt}${rel}>${escapeHtml(link[1])}</a>`;
      }
      return renderInlineMarkdownLinks(t);
    }

    /**
     * GitHub-style shield / markdown button: [![alt](imageUrl)](href)
     */
    function renderLinkedImageLine(trimmed) {
      const m = trimmed.match(/^\[!\[([^\]]*)\]\(([^)]+)\)\]\(([^)]+)\)$/);
      if (!m || !isSafeHttpUrl(m[2]) || !isSafeHttpUrl(m[3])) return null;
      const alt = m[1];
      const imgSrc = m[2];
      const href = m[3];
      return `<div class="md-button-row"><a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer"><img src="${escapeHtml(imgSrc)}" alt="${escapeHtml(alt)}" loading="lazy" decoding="async"></a></div>`;
    }

    function renderStandaloneImageLine(trimmed) {
      const m = trimmed.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
      if (!m || !isSafeHttpUrl(m[2])) return null;
      return `<p><img src="${escapeHtml(m[2])}" alt="${escapeHtml(m[1])}" loading="lazy" decoding="async" style="max-width:100%;height:auto"></p>`;
    }

    function slugify(value) {
      return String(value || '')
        .toLowerCase()
        .trim()
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function splitLines(value) {
      return String(value || '').split('\n').map(line => line.trim()).filter(Boolean);
    }

    function splitPipe(value) {
      return String(value || '').split('|').map(part => part.trim());
    }

    function parsePipeLines(value) {
      return splitLines(value).map(splitPipe);
    }

    function makeBlock(type, overrides = {}) {
      return { id: uid(), type, data: { ...BLOCK_TYPES[type].defaults(), ...overrides } };
    }

    function addBlock(type) {
      if (!BLOCK_TYPES[type]) return;
      const block = makeBlock(type);
      state.blocks.push(block);
      state.expandedBlockId = block.id;
      render();
    }

    function removeBlock(id) {
      const index = state.blocks.findIndex(block => block.id === id);
      state.blocks = state.blocks.filter(block => block.id !== id);
      if (state.expandedBlockId === id) {
        const next = state.blocks[index] || state.blocks[index - 1];
        state.expandedBlockId = next ? next.id : null;
      }
      render();
    }

    function moveBlock(id, direction) {
      const index = state.blocks.findIndex(block => block.id === id);
      if (index === -1) return;
      const nextIndex = direction === 'up' ? index - 1 : index + 1;
      if (nextIndex < 0 || nextIndex >= state.blocks.length) return;
      const copy = state.blocks.slice();
      [copy[index], copy[nextIndex]] = [copy[nextIndex], copy[index]];
      state.blocks = copy;
      render();
    }

    function updateBlock(id, key, value) {
      const block = state.blocks.find(item => item.id === id);
      if (!block) return;
      block.data[key] = value;
      renderMarkdownOnly();
      saveState();
    }

    function saveState() {
      localStorage.setItem(
        'github-dashboard-builder-state-v2',
        JSON.stringify({
          docName: state.docName,
          docTitle: state.docTitle,
          blocks: state.blocks,
          expandedBlockId: state.expandedBlockId,
          sidebarExpandedSection: state.sidebarExpandedSection,
          previewMarkdownExpanded: state.previewMarkdownExpanded
        })
      );
    }

    function syncPreviewMarkdownSection() {
      const el = document.querySelector('.preview-markdown-section');
      if (!el) return;
      const open = !!state.previewMarkdownExpanded;
      el.classList.toggle('is-collapsed', !open);
      const btn = el.querySelector('.sidebar-section-toggle');
      if (btn) btn.setAttribute('aria-expanded', String(open));
    }

    function syncSidebarSections() {
      const allowed = new Set(['presets', 'add', 'export']);
      if (state.sidebarExpandedSection && !allowed.has(state.sidebarExpandedSection)) {
        state.sidebarExpandedSection = null;
      }
      document.querySelectorAll('.sidebar [data-sidebar-section]').forEach(section => {
        const id = section.dataset.sidebarSection;
        const open = state.sidebarExpandedSection === id;
        section.classList.toggle('is-collapsed', !open);
        const btn = section.querySelector('.sidebar-section-toggle');
        if (btn) btn.setAttribute('aria-expanded', String(open));
      });
    }

    function ensureExpandedBlockId() {
      if (!state.blocks.length) {
        state.expandedBlockId = null;
        return;
      }
      if (!state.expandedBlockId || !state.blocks.some(b => b.id === state.expandedBlockId)) {
        state.expandedBlockId = state.blocks[0].id;
      }
    }

    function setExpandedBlockId(id) {
      if (!id || state.expandedBlockId === id) return;
      state.expandedBlockId = id;
      renderBlocks();
      saveState();
    }

    function extractHeadingTitles() {
      return state.blocks.map(block => {
        if (block.type === 'heading') return block.data.text;
        if (['paragraph', 'table', 'checklist', 'code', 'image'].includes(block.type)) return block.data.title;
        return '';
      }).filter(Boolean);
    }

    function buildMarkdownForBlock(block) {
      const d = block.data || {};

      if (block.type === 'heading') {
        const level = Math.max(1, Math.min(3, Number(d.level || 1)));
        return '#'.repeat(level) + ' ' + (d.text || 'Heading') + '\n\n' + (d.body || '');
      }
      if (block.type === 'badges') return d.items || '';
      if (block.type === 'links') {
        const rows = parsePipeLines(d.items).map(parts => `- [${parts[0] || 'Link'}](${parts[1] || '#'})`);
        return '## Quick Links\n\n' + rows.join('\n');
      }
      if (block.type === 'paragraph') return '## ' + (d.title || 'Section') + '\n\n' + (d.body || '');
      if (block.type === 'toc') {
        const items = extractHeadingTitles();
        const lines = items.length ? items.map(item => `- [${item}](#${slugify(item)})`).join('\n') : '- No headings yet';
        return '## Table of Contents\n\n' + lines;
      }
      if (block.type === 'checklist') {
        const rows = parsePipeLines(d.items).map(parts => `- [${parts[0] === 'true' ? 'x' : ' '}] ${parts[1] || ''}`);
        return '## ' + (d.title || 'Checklist') + '\n\n' + rows.join('\n');
      }
      if (block.type === 'table') {
        const headers = splitPipe(d.headers || 'Column 1|Column 2');
        const rows = splitLines(d.rows).map(splitPipe);
        const head = '| ' + headers.join(' | ') + ' |';
        const divider = '| ' + headers.map(() => '---').join(' | ') + ' |';
        const body = rows.map(row => '| ' + headers.map((_, i) => row[i] || '').join(' | ') + ' |').join('\n');
        return '## ' + (d.title || 'Table') + '\n\n' + [head, divider, body].filter(Boolean).join('\n');
      }
      if (block.type === 'details') {
        const summary = escapeHtml(d.summary || 'See more');
        return `<details>\n<summary>${summary}</summary>\n\n${d.body || ''}\n\n</details>`;
      }
      if (block.type === 'code') return `## ${d.title || 'Code'}\n\n\`\`\`${d.language || ''}\n${d.body || ''}\n\`\`\``;
      if (block.type === 'image') return `## ${d.title || 'Image'}\n\n![${d.alt || ''}](${d.url || ''})`;
      if (block.type === 'quote') return splitLines(d.body).map(line => `> ${line}`).join('\n');
      if (block.type === 'buttons') return parsePipeLines(d.items).map(parts => `[![${parts[0] || 'Button'}](${parts[2] || ''})](${parts[1] || '#'})`).join('\n');
      if (block.type === 'divider') return '---';
      if (block.type === 'custom') return d.body || '';
      return '';
    }

    function generateMarkdown() {
      return state.blocks.map(buildMarkdownForBlock).filter(Boolean).join('\n\n');
    }

    function renderField(block, key, label, type = 'text', placeholder = '') {
      const value = block.data[key] == null ? '' : String(block.data[key]);
      const safePlaceholder = escapeHtml(placeholder);

      if (type === 'textarea') {
        return `<div class="field"><label>${label}</label><textarea data-id="${block.id}" data-key="${key}" placeholder="${safePlaceholder}">${escapeHtml(value)}</textarea></div>`;
      }
      if (type === 'select-level') {
        return `<div class="field"><label>${label}</label><select data-id="${block.id}" data-key="${key}">${[1,2,3].map(n => `<option value="${n}"${String(n) === value ? ' selected' : ''}>H${n}</option>`).join('')}</select></div>`;
      }
      return `<div class="field"><label>${label}</label><input data-id="${block.id}" data-key="${key}" type="text" value="${escapeHtml(value)}" placeholder="${safePlaceholder}"></div>`;
    }

    function blockFields(block) {
      if (block.type === 'heading') return renderField(block, 'level', 'Heading level', 'select-level') + renderField(block, 'text', 'Heading text') + renderField(block, 'body', 'Body text', 'textarea');
      if (block.type === 'badges') return renderField(block, 'items', 'One badge markdown snippet per line', 'textarea');
      if (block.type === 'links') return renderField(block, 'items', 'One link per line: Label|URL', 'textarea');
      if (block.type === 'paragraph') return renderField(block, 'title', 'Section title') + renderField(block, 'body', 'Paragraph text', 'textarea');
      if (block.type === 'toc') return '<p class="small">This block auto-builds links from your current heading-like sections.</p>';
      if (block.type === 'checklist') return renderField(block, 'title', 'Checklist title') + renderField(block, 'items', 'One item per line: true|Label or false|Label', 'textarea');
      if (block.type === 'table') return renderField(block, 'title', 'Table title') + renderField(block, 'headers', 'Headers: col1|col2|col3') + renderField(block, 'rows', 'Rows: one row per line, values separated by |', 'textarea');
      if (block.type === 'details') return renderField(block, 'summary', 'Summary text') + renderField(block, 'body', 'Hidden content', 'textarea');
      if (block.type === 'code') return renderField(block, 'title', 'Code section title') + renderField(block, 'language', 'Code fence language') + renderField(block, 'body', 'Code', 'textarea');
      if (block.type === 'image') return renderField(block, 'title', 'Image section title') + renderField(block, 'alt', 'Alt text') + renderField(block, 'url', 'Image URL');
      if (block.type === 'quote') return renderField(block, 'body', 'Quoted text', 'textarea');
      if (block.type === 'buttons') return renderField(block, 'items', 'One button per line: Label|URL|ShieldImageURL', 'textarea');
      if (block.type === 'divider') return '<p class="small">Inserts a horizontal rule.</p>';
      if (block.type === 'custom') return renderField(block, 'body', 'Custom markdown', 'textarea');
      return '';
    }

    function renderBlocks() {
      if (!state.blocks.length) {
        blocksList.innerHTML = '<div class="empty">No blocks yet. Add one from the left to start building your markdown dashboard.</div>';
        state.expandedBlockId = null;
        return;
      }

      ensureExpandedBlockId();

      blocksList.innerHTML = state.blocks.map((block, index) => {
        const expanded = state.expandedBlockId === block.id;
        const collapsedClass = expanded ? '' : ' is-collapsed';
        return `
        <article class="block-card${collapsedClass}" data-block-id="${block.id}">
          <div class="block-card-header">
            <button type="button" class="block-card-toggle" aria-expanded="${expanded}" aria-controls="block-body-${block.id}" id="block-head-${block.id}">
              <span class="block-card-toggle-text">
                <strong>${BLOCK_TYPES[block.type].label}</strong>
                <span class="meta">Block ${index + 1} · ${block.type}</span>
              </span>
              <span class="block-card-chevron" aria-hidden="true">▾</span>
            </button>
            <div class="toolbar">
              <button class="ghost" data-action="up" data-id="${block.id}">↑</button>
              <button class="ghost" data-action="down" data-id="${block.id}">↓</button>
              <button class="danger" data-action="delete" data-id="${block.id}">Delete</button>
            </div>
          </div>
          <div class="block-card-body" id="block-body-${block.id}" role="region" aria-labelledby="block-head-${block.id}">
            ${blockFields(block)}
          </div>
        </article>`;
      }).join('');
    }

    function isTableLine(line) {
      const trimmed = line.trim();
      return trimmed.startsWith('|') && trimmed.endsWith('|');
    }

    function isDividerRow(line) {
      const cells = line.trim().slice(1, -1).split('|').map(cell => cell.trim());
      return cells.length > 0 && cells.every(cell => /^:?-{3,}:?$/.test(cell));
    }

    function renderPreview(markdown) {
      const lines = markdown.split('\n');
      const html = [];
      let inCode = false;
      let inList = false;
      let tableBuffer = [];
      let detailsBuffer = null;

      function closeList() {
        if (inList) {
          html.push('</ul>');
          inList = false;
        }
      }

      function flushTable() {
        if (!tableBuffer.length) return;

        if (tableBuffer.length < 2) {
          tableBuffer.forEach(line => {
            html.push('<div style="overflow:auto"><code>' + escapeHtml(line) + '</code></div>');
          });
          tableBuffer = [];
          return;
        }

        const rows = tableBuffer.map(line => line.trim().slice(1, -1).split('|').map(cell => cell.trim()));
        const header = rows[0];
        const bodyRows = isDividerRow(tableBuffer[1]) ? rows.slice(2) : rows.slice(1);

        let tableHtml = '<div style="overflow:auto"><table><thead><tr>';
        tableHtml += header.map(cell => `<th>${renderInlineMarkdownLinks(cell)}</th>`).join('');
        tableHtml += '</tr></thead>';

        if (bodyRows.length) {
          tableHtml += '<tbody>';
          tableHtml += bodyRows.map(row => '<tr>' + header.map((_, i) => `<td>${renderInlineMarkdownLinks(row[i] || '')}</td>`).join('') + '</tr>').join('');
          tableHtml += '</tbody>';
        }

        tableHtml += '</table></div>';
        html.push(tableHtml);
        tableBuffer = [];
      }

      for (const rawLine of lines) {
        const line = rawLine.replace(/\r$/, '');

        if (detailsBuffer !== null) {
          detailsBuffer.push(line);
          if (/^<\/details>\s*$/i.test(line.trim())) {
            html.push(processDetailsChunkForPreview(detailsBuffer.join('\n')));
            detailsBuffer = null;
          }
          continue;
        }

        if (line.startsWith('```')) {
          flushTable();
          closeList();
          if (!inCode) {
            inCode = true;
            html.push('<pre><code>');
          } else {
            inCode = false;
            html.push('</code></pre>');
          }
          continue;
        }

        if (inCode) {
          html.push(escapeHtml(line) + '\n');
          continue;
        }

        if (isTableLine(line)) {
          closeList();
          tableBuffer.push(line);
          continue;
        } else {
          flushTable();
        }

        if (/^- /.test(line)) {
          if (!inList) {
            html.push('<ul>');
            inList = true;
          }
          html.push('<li>' + renderListItemBody(line.replace(/^- /, '')) + '</li>');
          continue;
        }

        closeList();

        if (!line.trim()) {
          html.push('');
        } else if (line === '---') {
          html.push('<hr style="border:none;border-top:1px solid #2c3243; margin:20px 0;">');
        } else if (line.startsWith('# ')) {
          html.push('<h1>' + renderInlineMarkdownLinks(line.slice(2)) + '</h1>');
        } else if (line.startsWith('## ')) {
          html.push('<h2>' + renderInlineMarkdownLinks(line.slice(3)) + '</h2>');
        } else if (line.startsWith('### ')) {
          html.push('<h3>' + renderInlineMarkdownLinks(line.slice(4)) + '</h3>');
        } else if (line.startsWith('> ')) {
          html.push('<blockquote>' + renderInlineMarkdownLinks(line.slice(2)) + '</blockquote>');
        } else if (/^<details\b/i.test(line.trimStart())) {
          flushTable();
          closeList();
          const trimmed = line.trim();
          if (/<\/details>/i.test(trimmed)) {
            html.push(processDetailsChunkForPreview(trimmed));
          } else {
            detailsBuffer = [line];
          }
        } else {
          const trimmed = line.trim();
          const linkedImg = renderLinkedImageLine(trimmed);
          if (linkedImg) {
            html.push(linkedImg);
          } else {
            const soloImg = renderStandaloneImageLine(trimmed);
            if (soloImg) {
              html.push(soloImg);
            } else {
              html.push('<p>' + renderInlineMarkdownLinks(line) + '</p>');
            }
          }
        }
      }

      flushTable();
      closeList();
      if (detailsBuffer !== null) {
        html.push(
          '<p class="small">Unclosed &lt;details&gt; block:</p><pre><code>' +
            escapeHtml(detailsBuffer.join('\n')) +
            '</code></pre>'
        );
        detailsBuffer = null;
      }
      renderedPreview.innerHTML = html.join('\n') || '<p class="small">Nothing yet.</p>';
    }

    function renderMarkdownOnly() {
      const markdown = generateMarkdown();
      markdownOutput.textContent = markdown || 'Nothing yet.';
      renderPreview(markdown);
    }

    function render() {
      state.docName = docNameInput.value.trim() || 'README.md';
      state.docTitle = docTitleInput.value.trim() || 'GitHub Dashboard';
      renderBlocks();
      renderMarkdownOnly();
      syncSidebarSections();
      syncPreviewMarkdownSection();
      saveState();
    }

    function downloadFile(name, content, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function applyPreset(name) {
      if (name === 'readme') {
        state.docName = 'README.md';
        state.docTitle = 'Project README';
        state.blocks = [
          makeBlock('heading', { text: 'Project Name', body: 'A short and compelling overview of what this project does and why it exists.' }),
          makeBlock('badges'),
          makeBlock('links'),
          makeBlock('toc'),
          makeBlock('paragraph', { title: 'Features', body: '- Fast to use\n- GitHub-friendly output\n- Downloadable markdown' }),
          makeBlock('checklist', { title: 'Roadmap', items: 'true|Core builder\ntrue|Markdown export\nfalse|More advanced templates' }),
          makeBlock('table'),
          makeBlock('details', { summary: 'Setup instructions', body: '1. Clone the repo\n2. Open the file\n3. Start customizing blocks' })
        ];
      }

      if (name === 'profile') {
        state.docName = 'README.md';
        state.docTitle = 'Profile README';
        state.blocks = [
          makeBlock('heading', { text: 'Hi, I am Your Name', body: 'I build unusual tools, experiments, and interfaces on the open web.' }),
          makeBlock('buttons', { items: 'Portfolio|https://example.com|https://img.shields.io/badge/View-Portfolio-ff69b4?style=for-the-badge\nGitHub|https://github.com/username|https://img.shields.io/badge/GitHub-Profile-111827?style=for-the-badge' }),
          makeBlock('paragraph', { title: 'About Me', body: 'A few lines about what you make, what you care about, and what kind of projects people will find here.' }),
          makeBlock('table', { title: 'Current Focus', headers: 'Area|Details', rows: 'Frontend tools|Generators and visual builders\nGitHub UX|Contributor-friendly repo tooling' }),
          makeBlock('checklist', { title: 'Now', items: 'false|Shipping a new tool\nfalse|Improving README polish\nfalse|Exploring playful web ideas' })
        ];
      }

      if (name === 'docs') {
        state.docName = 'docs-index.md';
        state.docTitle = 'Docs Hub';
        state.blocks = [
          makeBlock('heading', { text: 'Documentation Hub', body: 'Start here to find setup instructions, guides, references, and project links.' }),
          makeBlock('toc'),
          makeBlock('table', { title: 'Guides', headers: 'Guide|Purpose|Link', rows: 'Getting Started|Initial setup|#getting-started\nContributing|How to help|#contributing\nFAQ|Common questions|#faq' }),
          makeBlock('details', { summary: 'FAQ', body: '- Question one\n- Question two\n- Question three' }),
          makeBlock('paragraph', { title: 'Resources', body: '- Design assets\n- Screenshots\n- Sample configs' })
        ];
      }

      if (name === 'roadmap') {
        state.docName = 'ROADMAP.md';
        state.docTitle = 'Roadmap';
        state.blocks = [
          makeBlock('heading', { text: 'Project Roadmap', body: 'Planned work, future improvements, and active priorities.' }),
          makeBlock('checklist', { title: 'Phase 1', items: 'true|Define scope\ntrue|Create first prototype\nfalse|Test with users' }),
          makeBlock('checklist', { title: 'Phase 2', items: 'false|Refine UX\nfalse|Add more block types\nfalse|Publish landing page' }),
          makeBlock('quote', { body: 'A roadmap is most useful when it stays honest, concrete, and easy to scan.' })
        ];
      }

      docNameInput.value = state.docName;
      docTitleInput.value = state.docTitle;
      state.expandedBlockId = state.blocks[0]?.id || null;
      state.sidebarExpandedSection = null;
      state.previewMarkdownExpanded = false;
      render();
    }

    function wireEvents() {
      addBlockButtons.innerHTML = Object.entries(BLOCK_TYPES).map(([type, info]) => `<button data-type="${type}">${info.label}<span>${info.hint}</span></button>`).join('');

      const sidebarRoot = document.querySelector('.sidebar');
      if (sidebarRoot) {
        sidebarRoot.addEventListener('click', event => {
          const btn = event.target.closest('.sidebar-section-toggle');
          if (!btn) return;
          const section = btn.closest('[data-sidebar-section]');
          if (!section) return;
          const id = section.dataset.sidebarSection;
          state.sidebarExpandedSection = state.sidebarExpandedSection === id ? null : id;
          syncSidebarSections();
          saveState();
        });
      }

      const previewRoot = document.querySelector('.preview');
      if (previewRoot) {
        previewRoot.addEventListener('click', event => {
          const btn = event.target.closest('.preview-markdown-section .sidebar-section-toggle');
          if (!btn) return;
          state.previewMarkdownExpanded = !state.previewMarkdownExpanded;
          syncPreviewMarkdownSection();
          saveState();
        });
      }

      addBlockButtons.addEventListener('click', event => {
        const button = event.target.closest('button[data-type]');
        if (!button) return;
        addBlock(button.dataset.type);
      });

      blocksList.addEventListener('input', event => {
        const el = event.target;
        const id = el.dataset.id;
        const key = el.dataset.key;
        if (!id || !key) return;
        updateBlock(id, key, el.value);
      });

      blocksList.addEventListener('click', event => {
        const toggle = event.target.closest('.block-card-toggle');
        if (toggle) {
          const card = toggle.closest('[data-block-id]');
          if (card?.dataset.blockId) setExpandedBlockId(card.dataset.blockId);
          return;
        }
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        const { action, id } = button.dataset;
        if (action === 'delete') removeBlock(id);
        if (action === 'up') moveBlock(id, 'up');
        if (action === 'down') moveBlock(id, 'down');
      });

      blocksList.addEventListener('focusin', event => {
        const el = event.target;
        if (!el.matches('input, textarea, select')) return;
        const card = el.closest('[data-block-id]');
        if (!card?.dataset.blockId) return;
        setExpandedBlockId(card.dataset.blockId);
      });

      docNameInput.addEventListener('input', render);
      docTitleInput.addEventListener('input', render);

      document.querySelectorAll('[data-preset]').forEach(button => {
        button.addEventListener('click', () => applyPreset(button.dataset.preset));
      });

      document.getElementById('copyMarkdownBtn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(generateMarkdown());
          alert('Markdown copied to clipboard.');
        } catch {
          alert('Clipboard copy failed in this browser.');
        }
      });

      document.getElementById('downloadMarkdownBtn').addEventListener('click', () => {
        downloadFile(state.docName || 'README.md', generateMarkdown(), 'text/markdown;charset=utf-8');
      });

      document.getElementById('downloadJsonBtn').addEventListener('click', () => {
        const safeName = (state.docTitle || 'dashboard').replace(/\s+/g, '-').toLowerCase() + '.json';
        downloadFile(safeName, JSON.stringify(state, null, 2), 'application/json;charset=utf-8');
      });

      document.getElementById('loadJsonBtn').addEventListener('click', () => {
        jsonInput.click();
      });

      jsonInput.addEventListener('change', event => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || ''));
            if (!Array.isArray(parsed.blocks)) throw new Error('Invalid config');
            state.docName = parsed.docName || 'README.md';
            state.docTitle = parsed.docTitle || 'GitHub Dashboard';
            state.blocks = parsed.blocks;
            state.expandedBlockId =
              parsed.expandedBlockId && state.blocks.some(b => b.id === parsed.expandedBlockId)
                ? parsed.expandedBlockId
                : state.blocks[0]?.id || null;
            const side = parsed.sidebarExpandedSection;
            state.sidebarExpandedSection =
              side && ['presets', 'add', 'export'].includes(side) ? side : null;
            state.previewMarkdownExpanded = Boolean(parsed.previewMarkdownExpanded);
            docNameInput.value = state.docName;
            docTitleInput.value = state.docTitle;
            render();
          } catch {
            alert('That JSON file could not be loaded.');
          }
        };
        reader.readAsText(file);
        event.target.value = '';
      });
    }

    function loadSavedState() {
      const saved = localStorage.getItem('github-dashboard-builder-state-v2');
      if (!saved) {
        applyPreset('readme');
        return;
      }
      try {
        const parsed = JSON.parse(saved);
        if (!Array.isArray(parsed.blocks)) throw new Error('Bad state');
        state.docName = parsed.docName || 'README.md';
        state.docTitle = parsed.docTitle || 'GitHub Dashboard';
        state.blocks = parsed.blocks;
        state.expandedBlockId =
          parsed.expandedBlockId && state.blocks.some(b => b.id === parsed.expandedBlockId)
            ? parsed.expandedBlockId
            : state.blocks[0]?.id || null;
        const side = parsed.sidebarExpandedSection;
        state.sidebarExpandedSection =
          side && ['presets', 'add', 'export'].includes(side) ? side : null;
        state.previewMarkdownExpanded = Boolean(parsed.previewMarkdownExpanded);
        docNameInput.value = state.docName;
        docTitleInput.value = state.docTitle;
        render();
      } catch {
        applyPreset('readme');
      }
    }

    wireEvents();
    loadSavedState();
  </script>
</body>
</html>
